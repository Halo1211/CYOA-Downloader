name: Windows build

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-optional.txt
          python -m pip install -r requirements-dev.txt

      - name: Build executable
        shell: pwsh
        run: python -m PyInstaller --clean --noconfirm CYOA-Downloader.spec

      - name: Archive executable
        shell: pwsh
        run: Compress-Archive -Path "dist\CYOA Downloader.exe" -DestinationPath "dist\CYOA-Downloader-Windows-x64.zip"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: CYOA-Downloader-Windows-x64
          path: dist/CYOA-Downloader-Windows-x64.zip
